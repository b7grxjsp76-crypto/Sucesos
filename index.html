<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea de Tiempo Interactiva - Gestión Integral</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text: #e2e8f0;
            --danger: #f87171;
            --accent: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        h1 { text-align: center; color: var(--primary); text-transform: uppercase; }

        /* Formulario de entrada */
        .admin-controls {
            max-width: 800px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--primary);
        }

        .admin-controls input, .admin-controls textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add { background: var(--primary); color: #0f172a; }
        .btn-edit { background: var(--accent); color: #0f172a; margin-right: 5px; }
        .btn-delete { background: var(--danger); color: white; }

        /* Estructura Línea de Tiempo */
        .timeline {
            position: relative;
            max-width: 1000px;
            margin: 40px auto;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background: var(--primary);
            top: 0; bottom: 0; left: 50%;
            margin-left: -2px;
        }

        .container {
            padding: 10px 40px;
            position: relative;
            width: 50%;
            box-sizing: border-box;
        }

        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }

        .content {
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border-top: 4px solid var(--primary);
            position: relative;
        }

        .date-display { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .text-display { margin: 10px 0; display: block; }

        .actions { margin-top: 15px; }

        @media (max-width: 768px) {
            .timeline::after { left: 31px; }
            .container { width: 100%; padding-left: 70px; text-align: left !important; }
            .right { left: 0; }
        }
    </style>
</head>
<body>

    <h1>📍 Gestión de Línea de Tiempo Integral</h1>

    <div class="admin-controls">
        <h3>Agregar Nuevo Evento</h3>
        <input type="text" id="eventDate" placeholder="Fecha (ej: 14 Enero 2024)">
        <input type="text" id="eventTitle" placeholder="Título del Evento">
        <textarea id="eventDesc" rows="3" placeholder="Descripción detallada, causas y consecuencias"></textarea>
        <button class="btn btn-add" onclick="addEvent()">Agregar a la Cronología</button>
    </div>

    <div class="timeline" id="timelineContainer">
        </div>

    <script>
        [span_2](start_span)[span_3](start_span)[span_4](start_span)// Datos iniciales basados en el caso[span_2](end_span)[span_3](end_span)[span_4](end_span)
        let events = [
            { id: 1, date: "14 Enero 2024", title: "El Detonante", desc: "Choque vehicular que genera deuda con tercero e impacto de responsabilidad inmediata." },
            { id: 2, date: "Enero 2024 (Post)", title: "Estructura de Riesgo", desc: "Inicio de flujos a través de cuenta de terceros sin comprobantes claros." },
            { id: 3, date: "Noviembre 2024", title: "Retención de Capital", desc: "Confirmación de $6.000.000 retenidos y quiebre de confianza." }
        ];

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            events.forEach((event, index) => {
                const side = index % 2 === 0 ? 'left' : 'right';
                const html = `
                    <div class="container ${side}" id="event-${event.id}">
                        <div class="content">
                            <span class="date-display">${event.date}</span>
                            <h4 style="margin:5px 0; color:var(--accent)">${event.title}</h4>
                            <span class="text-display">${event.desc}</span>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="editEvent(${event.id})">Editar</button>
                                <button class="btn btn-delete" onclick="deleteEvent(${event.id})">Borrar</button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function addEvent() {
            const date = document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;

            if(date && title && desc) {
                const newEvent = {
                    id: Date.now(),
                    date,
                    title,
                    desc
                };
                events.push(newEvent);
                renderTimeline();
                // Limpiar campos
                document.getElementById('eventDate').value = '';
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDesc').value = '';
            } else {
                alert("Por favor completa todos los campos.");
            }
        }

        function deleteEvent(id) {
            if(confirm("¿Estás seguro de borrar este hito?")) {
                events = events.filter(e => e.id !== id);
                renderTimeline();
            }
        }

        function editEvent(id) {
            const event = events.find(e => e.id === id);
            const newDesc = prompt("Editar descripción:", event.desc);
            if(newDesc !== null) {
                event.desc = newDesc;
                renderTimeline();
            }
        }

        // Carga inicial
        renderTimeline();
    </script>
</body>
</html>
